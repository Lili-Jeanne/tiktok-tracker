<!DOCTYPE html>
<html>
<head>
    <title>Live Collège Trends</title>
    <style>
        .trend-card { border: 1px solid #ddd; padding: 10px; margin: 5px; border-radius: 8px; display: inline-block; font-family: sans-serif; }
        .growth { color: #00f2ea; font-weight: bold; }
        .tag { font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔥 Trends TikTok (Direct)</h1>
    <div id="container">Chargement des tendances...</div>
<script>
    const JSON_URL = 'https://raw.githubusercontent.com/TON_USER/TON_REPO/main/trends.json';

    async function loadTrends() {
        const container = document.getElementById('container');
        try {
            const response = await fetch(JSON_URL);
            const data = await response.json();
            
            container.innerHTML = ''; 

            data.trends.forEach(item => {
                // On gère le cas où growth n'existe pas encore
                const growthText = item.growth ? `+${item.growth} places` : "En hausse 🔥";
                
                container.innerHTML += `
                    <div class="trend-card" style="border: 2px solid ${item.priority ? '#ff0050' : '#ddd'};">
                        <div class="tag">#${item.tag}</div>
                        <div class="growth">📊 ${growthText}</div>
                        ${item.isNew ? '<b style="color:red">✨ NOUVEAU</b>' : ''}
                    </div>
                `;
            });
        } catch (e) {
            container.innerHTML = "Erreur de chargement des données.";
        }
    }
    loadTrends();
</script>
</body>
</html>
